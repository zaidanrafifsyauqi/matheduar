<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Quiz</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="quiz-page">

    <!-- Dekorasi -->
    <div class="sun">☀️</div>

    <div class="cloud cloud1">☁️</div>
    <div class="cloud cloud2">☁️</div>

    <div class="floating cube">🧊</div>
    <div class="floating ball">⚽</div>
    <div class="floating box">📦</div>
    <div class="floating cone">🔺</div>

    <div class="tree-left">🌳</div>
    <div class="tree-right">🌳</div>

    <!-- Card Quiz -->
    <div class="quiz-card">

    <h1>🏆 Tantangan Quiz</h1>

    <div id="levelTitle" class="level-badge">
    </div>

    <p id="progress">
        Soal 1 dari 5
    </p>

        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div class="score-box">
    ⭐ Skor : <span id="live-score">0</span>
</div>

        <h2 id="question"></h2>

        <div id="feedback"></div>

        <button class="answer btn-yellow"
            onclick="checkAnswer(0)">
        </button>

        <button class="answer btn-green"
            onclick="checkAnswer(1)">
        </button>

        <button class="answer btn-blue"
            onclick="checkAnswer(2)">
        </button>

        <button class="answer btn-red"
            onclick="checkAnswer(3)">
        </button>

    </div>

    <script src="../js/quiz.js"></script>

</body>
</html>
