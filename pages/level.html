<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pilih Level Quiz</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body class="quiz-page">

<!-- Dekorasi -->

<div class="sun">☀️</div>

<div class="cloud cloud1">☁️</div>
<div class="cloud cloud2">☁️</div>

<div class="floating cube">⬜</div>
<div class="floating ball">⚪</div>
<div class="floating box">▭</div>
<div class="floating cone">🔺</div>

<div class="tree-left">🌳</div>
<div class="tree-right">🌳</div>

<!-- ===========================
CARD LEVEL
=========================== -->

<div class="quiz-card">

<h1>📝 Pilih Level Quiz</h1>

<p>

Uji pemahamanmu tentang
<b>Bangun Datar</b>.
Selesaikan setiap level untuk menjadi
<b>Ahli Bangun Datar!</b>

</p>

<button
class="level-btn level1"
onclick="startLevel(1)">

🟢 Level 1 - Dasar

</button>

<button
class="level-btn level2"
onclick="startLevel(2)">

🔵 Level 2 - Mudah

</button>

<button
class="level-btn level3"
onclick="startLevel(3)">

🟡 Level 3 - Sedang

</button>

<button
class="level-btn level4"
onclick="startLevel(4)">

🟠 Level 4 - Sulit

</button>

<button
class="level-btn level5"
onclick="startLevel(5)">

🔴 Level 5 - Ahli

</button>

<button
style="background:#42A5F5;color:white;"
onclick="location.href='../index.html'">

🏠 Kembali ke Home

</button>

</div>

<script>

function startLevel(level){

    localStorage.setItem("level", level);

    window.location.href="quiz.html";

}

</script>

</body>

</html>
